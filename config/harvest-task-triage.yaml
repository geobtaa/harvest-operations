name: "Harvest Dashboard: Triage"
type: task_dashboard
dashboard_task: triage
harvest_records_csv: inputs/harvest-records.csv
websites_csv: reference_data/websites.csv
output_dashboard_html: reports/harvest-task-dashboard.html
output_due_dashboard_html: reports/harvest-task-dashboard-due.html
output_review_dashboard_html: reports/harvest-task-dashboard-review.html
output_todo_dashboard_html: reports/harvest-task-dashboard-todo.html
issue_repositories:
  - name: harvest-operations
    repository: geobtaa/harvest-operations
    issues_new_url: https://github.com/geobtaa/harvest-operations/issues/new
    template: harvest-task.md
    token_env: GEOBTAA_PROJECTS_TOKEN
    lookup_existing_issues: true
    labels:
      - harvest-task
    projects:
      - geobtaa/4

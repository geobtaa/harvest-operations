name: pasda
type: pasda
metadata_base_url: "https://www.pasda.psu.edu/metadata/"
download_base_url: "https://www.pasda.psu.edu/download/"
json_base_url: "https://www.pasda.psu.edu/json/"
source_manifest: metadata_directory
cache_dir: inputs/pasda/metadata_xml
output_dir: outputs/pasda
incremental: true
use_registry: true
# These compact registries are intended to be Git-trackable recovery state.
# The raw XML cache and dated outputs can remain local/disposable.
metadata_registry_path: registry/pasda_metadata_registry.csv
normalized_registry_path: registry/pasda_normalized_registry.jsonl
build_download_inventory: true
build_json_inventory: true
download_inventory_max_depth: 4
# PASDA /download/ is very large; start with a bounded first-pass crawl.
download_inventory_max_pages: 3000
# Optional pause between PASDA /download/ directory listing requests.
download_inventory_request_delay_seconds: 0.1
json_inventory_max_depth: 0
json_inventory_max_pages: 1000
json_inventory_request_delay_seconds: 0.1
# Routine reruns should produce compact change files, not full dated rebuild files.
write_inventory_outputs: false
write_normalized_outputs: false
write_full_upload_outputs: false
write_change_upload_outputs: true
write_change_review_outputs: false
write_match_review_outputs: false
write_report_outputs: true
write_diagnostic_report_outputs: false
# Optional: set sample_size to download and parse a subset after writing the full inventory.
# sample_size: 250
sample_strategy: mixed
sample_seed: 42
timeout: 30
user_agent: "harvest-operations PASDA metadata-directory harvester"

name: pasda
type: pasda
metadata_base_url: "https://www.pasda.psu.edu/metadata/"
download_base_url: "https://www.pasda.psu.edu/download/"
source_manifest: metadata_directory
cache_dir: inputs/pasda/metadata_xml
output_dir: outputs/pasda
incremental: true
use_registry: true
# These compact registries are intended to be Git-trackable recovery state.
# The raw XML cache and dated outputs can remain local/disposable.
metadata_registry_path: registry/pasda_metadata_registry.csv
normalized_registry_path: registry/pasda_normalized_registry.jsonl
# Optional: set sample_size to download and parse a subset after writing the full inventory.
# sample_size: 250
sample_strategy: mixed
sample_seed: 42
timeout: 30
user_agent: "harvest-operations PASDA metadata-directory harvester"

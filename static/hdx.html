<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Humanitarian Data Exchange Harvester</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    h2, h3 { margin-top: 1.5em; }
    #upload-message { color: green; }
    button { margin: 0.5em 0; }
    pre { border: 1px solid #ccc; padding: 1em; margin-top: 1em; height: 240px; overflow: auto; }
  </style>
</head>
<body>
  <h1>HDX Harvester</h1>
  <p id="upload-message"></p>

  <h3>Step 1: Download Metadata</h3>
  <p>Run the HDX metadata download first. This creates <code>inputs/hdx_geodata.json</code>, which the harvester uses in Step 2.</p>
  <button id="download-button" onclick="runDownload()">Download Metadata</button>
  <pre id="download-output"></pre>

  <h3>Step 2: Run Harvester</h3>
  <button id="harvester-button" onclick="runHarvester()">Run Harvester</button>
  <pre id="stream-output"></pre>

  <script>
    // Show success message if redirected with ?upload=success
    const params = new URLSearchParams(window.location.search);
    if (params.get("upload") === "success") {
        document.getElementById("upload-message").textContent = "Upload successful! File saved as HDX in the data folder.";
    }

    function streamEndpoint(url, outputId, buttonId, startMessage, closedMessage) {
      const output = document.getElementById(outputId);
      const button = document.getElementById(buttonId);
      output.textContent = startMessage + "\n";
      button.disabled = true;

      const eventSource = new EventSource(url);

      eventSource.onmessage = function (event) {
        if (event.data === "DONE") {
          eventSource.close();
          button.disabled = false;
          return;
        }
        output.textContent += event.data + "\n";
        output.scrollTop = output.scrollHeight;
      };

      eventSource.onerror = function () {
        output.textContent += closedMessage + "\n";
        eventSource.close();
        button.disabled = false;
      };
    }

    function runDownload() {
      streamEndpoint(
        "/run-hdx-download-stream",
        "download-output",
        "download-button",
        "Starting metadata download...",
        "Stream closed. If the download did not complete, please check logs."
      );
    }

    // Streaming harvester output
    function runHarvester() {
      streamEndpoint(
        "/run-hdx-stream",
        "stream-output",
        "harvester-button",
        "Starting harvester...",
        "Stream closed. If the harvester did not complete, please check logs."
      );
    }
  </script>
</body>
</html>
